<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Symphony mark</title>
  <desc id="desc">Point-and-orbit mark on an 8px grid: centered field, ring at r=80, accent point on a 45-degree optical shift.</desc>
