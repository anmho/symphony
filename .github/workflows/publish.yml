name: Publish

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag
        required: true
        default: latest
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ inputs.dist_tag || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and test
        run: bun run validate

      - name: Build
        run: bun run build

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/package mismatch: tag=$tag_version package=$pkg_version"
            exit 1
          fi

      - name: Check published version
        id: package-version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          package_scope="${package_name%%/*}"
          package_basename="${package_name##*/}"
          package_tarball="https://registry.npmjs.org/${package_scope}%2f${package_basename}/-/${package_basename}-${package_version}.tgz"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          elif curl --fail --silent --head "$package_tarball" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.package-version.outputs.published == 'false'
        run: npm publish --access public --tag "$NPM_DIST_TAG"
