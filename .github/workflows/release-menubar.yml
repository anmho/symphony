name: Release Menu Bar

on:
  workflow_dispatch:
    inputs:
      version:
        description: Menu bar app version (e.g. 0.1.2)
        required: true
        default: "0.1.2"
  push:
    tags:
      - "menubar-v*"

permissions:
  contents: write

jobs:
  build-aarch64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/menubar-v* ]]; then
            version="${GITHUB_REF_NAME#menubar-v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Package app
        working-directory: macos/SymphonyMenuBar
        run: |
          chmod +x build.sh package.sh
          ./package.sh "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: symphony-menubar-aarch64
          path: |
            macos/SymphonyMenuBar/dist/Symphony_${{ steps.version.outputs.value }}_aarch64.app.tar.gz
            macos/SymphonyMenuBar/dist/Symphony_${{ steps.version.outputs.value }}_aarch64.dmg
            macos/SymphonyMenuBar/dist/checksums-${{ steps.version.outputs.value }}.txt
            macos/SymphonyMenuBar/dist/*.sha256

  release:
    needs: [build-aarch64]
    if: needs.build-aarch64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/menubar-v* ]]; then
            version="${GITHUB_REF_NAME#menubar-v}"
            tag="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
            tag="menubar-v${version}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Write latest manifest
        run: |
          version="${{ steps.version.outputs.value }}"
          cat > artifacts/latest-menubar.json <<EOF
          {
            "version": "${version}",
            "tag": "${{ steps.version.outputs.tag }}",
            "platforms": {
              "aarch64": {
                "dmg": "Symphony_${version}_aarch64.dmg",
                "tarball": "Symphony_${version}_aarch64.app.tar.gz"
              }
            }
          }
          EOF
          cp macos/SymphonyMenuBar/install.sh artifacts/install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Symphony v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
